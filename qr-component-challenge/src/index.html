<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | QR code component</title>
    <link rel="stylesheet" href="./index.css" type="text/css" />
  </head>
  <body class="grid min-h-screen place-content-center bg-slate-300 font-outfit">
    <main>
      <article
        class="flex w-min flex-col items-center justify-center gap-6 rounded-2xl bg-white px-4 pb-10 pt-4 shadow-[0_25px_25px_0_rgba(0,0,0,0.05)]"
      >
        <img
          class="h-auto max-w-72 rounded-xl"
          src="./images/image-qr-code.png"
          alt="QR code"
        />
        <div class="flex flex-col gap-4 px-4 text-center">
          <h1 class="text-[1.375rem] font-bold leading-[1.2] text-slate-900">
            Improve your front-end skills by building projects
          </h1>
          <p
            class="text-[0.9375rem] font-normal leading-[1.4] tracking-[0.2px] text-slate-500"
          >
            Scan the QR code to visit Frontend Mentor and take your coding
            skills to the next level
          </p>
        </div>
      </article>
    </main>
  </body>
</html>
